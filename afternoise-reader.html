<!DOCTYPE html>
<html lang="en">
<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--pf:'Bebas Neue',sans-serif;--lb:'Manrope',sans-serif;--gold:#D4A853;--paper:#F4F0E6;--dark:#0D0D0D;}
html,body{height:100%;background:#111;font-family:var(--lb);overflow:hidden;user-select:none;-webkit-user-select:none;}
#reader{position:fixed;inset:0;display:flex;flex-direction:column;background:#111;}
#reader-bar{height:44px;background:#0A0A0A;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;z-index:10;}
.rb-logo{font-family:'Abril Fatface',serif;font-size:18px;letter-spacing:2px;color:#F4F0E6;cursor:pointer;}
.rb-logo span{color:#D4A853;}
.rb-info{font-family:var(--lb);font-size:10px;letter-spacing:2px;color:#555;text-transform:uppercase;text-align:center;}
.rb-close{font-family:var(--lb);font-size:9px;letter-spacing:2px;color:#555;text-transform:uppercase;background:none;border:none;cursor:pointer;transition:color .2s;padding:8px;}
.rb-close:hover{color:#D4A853;}
#stage{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 60px;position:relative;overflow:hidden;}
#book{position:relative;display:flex;align-items:stretch;box-shadow:0 40px 120px rgba(0,0,0,.9),0 0 0 1px rgba(255,255,255,.04);}
.page{width:var(--pw);height:var(--ph);position:relative;overflow:hidden;flex-shrink:0;}
.page-left{border-right:1px solid rgba(0,0,0,.3);}
.page-right{border-left:1px solid rgba(0,0,0,.3);}
.page-inner{width:100%;height:100%;position:relative;overflow:hidden;}
.spine-left{position:absolute;right:0;top:0;bottom:0;width:24px;background:linear-gradient(to right,transparent,rgba(0,0,0,.4));pointer-events:none;z-index:2;}
.spine-right{position:absolute;left:0;top:0;bottom:0;width:24px;background:linear-gradient(to left,transparent,rgba(0,0,0,.4));pointer-events:none;z-index:2;}
.nav-btn{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:80px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.4);font-size:18px;cursor:pointer;z-index:30;display:flex;align-items:center;justify-content:center;transition:all .2s;border-radius:4px;}
.nav-btn:hover{background:rgba(212,168,83,.2);color:#D4A853;border-color:rgba(212,168,83,.3);}
.nav-btn:disabled{opacity:.2;cursor:not-allowed;}
#btn-prev{left:8px;}
#btn-next{right:8px;}
#thumb-strip{height:80px;background:#0A0A0A;border-top:1px solid #1A1A1A;display:flex;align-items:center;gap:8px;padding:0 24px;overflow-x:auto;flex-shrink:0;scrollbar-width:thin;scrollbar-color:#222 transparent;}
#thumb-strip::-webkit-scrollbar{height:3px;}
#thumb-strip::-webkit-scrollbar-thumb{background:#333;}
.thumb{flex-shrink:0;width:44px;height:60px;border:1.5px solid #333;cursor:pointer;transition:border-color .2s,transform .2s;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.thumb:hover{border-color:#D4A853;transform:scale(1.05);}
.thumb.active{border-color:#D4A853;}
.thumb-bg{width:100%;height:100%;position:absolute;inset:0;}
.thumb-label{position:absolute;bottom:2px;left:0;right:0;font-family:var(--lb);font-size:6px;letter-spacing:1px;text-align:center;color:rgba(255,255,255,.5);text-transform:uppercase;z-index:1;}
#page-counter{font-family:var(--lb);font-size:9px;letter-spacing:2px;color:#444;text-align:center;padding:6px 0;background:#0A0A0A;flex-shrink:0;}
#swipe-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-family:var(--lb);font-size:9px;letter-spacing:2px;color:#333;text-transform:uppercase;animation:fadeout 3s ease forwards;pointer-events:none;white-space:nowrap;}
@keyframes fadeout{0%,70%{opacity:1;}100%{opacity:0;}}
@media(max-width:768px){#book{flex-direction:column;}.page-left,.page-right{border:none;}#stage{padding:16px;}}
.p-cover{background:#0D0D0D;color:#F4F0E6;}
.p-cover .cv-photo{position:absolute;inset:0;background:linear-gradient(135deg,#1a1a1a,#0d0d0d);display:flex;align-items:center;justify-content:center;}
.p-cover .cv-photo span{font-size:9px;letter-spacing:3px;color:#2a2a2a;font-family:var(--lb);}
.p-cover .cv-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.95) 0%,transparent 60%);}
.p-cover .cv-content{position:absolute;bottom:0;left:0;right:0;padding:24px 20px;}

.p-cover .cv-rule{height:1px;background:#D4A853;margin:8px 0;}

.p-cover .cv-line{font-family:var(--lb);font-size:9px;letter-spacing:1px;color:rgba(244,240,230,.5);padding:4px 0;border-bottom:.5px solid rgba(255,255,255,.06);}
.p-cover .cv-artists{display:flex;justify-content:space-between;margin-top:12px;}
.p-cover .cv-aname{font-family:var(--pf);font-size:clamp(14px,3vw,20px);color:#F4F0E6;letter-spacing:1px;}
.p-cover .cv-arole{font-family:var(--lb);font-size:7px;letter-spacing:1px;color:rgba(212,168,83,.7);text-transform:uppercase;margin-top:2px;}

.p-toc .tl{font-family:var(--lb);font-size:8px;letter-spacing:4px;color:#888;text-transform:uppercase;margin-bottom:4px;}
.p-toc .tt{font-family:var(--pf);font-size:28px;color:#111;line-height:1;}
.p-toc .tlist{padding:12px 20px;}
.p-toc .ti{display:flex;align-items:baseline;gap:8px;padding:8px 0;border-bottom:.5px solid #ddd;}
.p-toc .tn{font-family:var(--pf);font-size:18px;color:#ddd;min-width:24px;line-height:1;}
.p-toc .tw{flex:1;}
.p-toc .ts{font-family:var(--lb);font-size:7px;letter-spacing:3px;color:#D4A853;text-transform:uppercase;margin-bottom:2px;}
.p-toc .tk{font-family:var(--pf);font-size:15px;color:#111;line-height:1.1;}
.p-toc .td{font-family:var(--lb);font-style:italic;font-size:9px;color:#888;margin-top:2px;}
.p-let{background:#0D0D0D;color:#F4F0E6;padding:24px 20px;height:100%;overflow:hidden;}
.p-let .le{font-family:var(--lb);font-size:7px;letter-spacing:4px;color:rgba(212,168,83,.6);text-transform:uppercase;margin-bottom:8px;}
.p-let .lt{font-family:var(--pf);font-size:28px;color:#F4F0E6;line-height:1;margin-bottom:12px;}
.p-let .lr{height:1px;background:#D4A853;margin-bottom:16px;}
.p-let .lb2{font-family:var(--lb);font-size:10px;line-height:1.8;color:rgba(244,240,230,.75);}
.p-let .ld{float:left;font-family:var(--pf);font-size:52px;line-height:.8;margin-right:6px;margin-top:4px;color:#D4A853;}
.p-let .lsig{margin-top:16px;padding-top:12px;border-top:.5px solid rgba(255,255,255,.1);}
.p-let .lsn{font-family:var(--pf);font-size:18px;color:#D4A853;}
.p-let .lsr{font-family:var(--lb);font-size:8px;letter-spacing:2px;color:rgba(244,240,230,.3);text-transform:uppercase;margin-top:2px;}
.p-art{background:#0D0D0D;color:#F4F0E6;position:relative;}
.p-art .ap{position:absolute;inset:0;background:linear-gradient(135deg,#1a1a1a,#0d0d0d);display:flex;align-items:center;justify-content:center;}
.p-art .ap span{font-family:var(--lb);font-size:8px;letter-spacing:2px;color:#222;}
.p-art .ao{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.98) 0%,rgba(0,0,0,.3) 50%,transparent 100%);}
.p-art .ac{position:absolute;bottom:0;left:0;right:0;padding:20px;}
.p-art .ab{display:inline-block;font-family:var(--lb);font-size:7px;letter-spacing:3px;text-transform:uppercase;padding:3px 10px;margin-bottom:8px;}
.p-art .ah{font-family:var(--pf);font-size:clamp(20px,4vw,32px);color:#F4F0E6;line-height:1;margin-bottom:6px;}
.p-art .as{font-family:var(--lb);font-style:italic;font-size:11px;color:rgba(244,240,230,.55);line-height:1.4;margin-bottom:10px;}
.p-art .aby{font-family:var(--lb);font-size:8px;letter-spacing:1px;color:rgba(244,240,230,.3);text-transform:uppercase;}
.p-bod{background:#F4F0E6;color:#111;padding:28px 22px;height:100%;overflow:hidden;position:relative;}
.p-bod .bs{font-family:var(--lb);font-size:7px;letter-spacing:4px;color:#D4A853;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #111;}
.p-bod .bt{font-family:var(--lb);font-size:10px;line-height:1.85;color:#333;}
.p-bod .bd{float:left;font-family:var(--pf);font-size:48px;line-height:.8;margin-right:6px;margin-top:4px;color:#111;}
.p-bod .bpq{font-family:var(--pf);font-size:15px;color:#111;line-height:1.3;padding:14px 0;margin:14px 0;border-top:1.5px solid #111;border-bottom:1.5px solid #111;}
.p-pl{background:#111;color:#F4F0E6;padding:24px 20px;height:100%;overflow:hidden;}
.p-pl .plt{font-family:var(--pf);font-size:22px;letter-spacing:1px;color:#F4F0E6;margin-bottom:4px;}
.p-pl .pls{font-family:var(--lb);font-style:italic;font-size:9px;color:rgba(244,240,230,.4);margin-bottom:16px;}
.p-pl .plr{height:1px;background:#D4A853;margin-bottom:16px;}
.p-pl .pltr{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:.5px solid rgba(255,255,255,.06);}
.p-pl .pln{font-family:var(--pf);font-size:16px;color:#333;min-width:20px;text-align:right;}
.p-pl .pli{flex:1;}
.p-pl .pltn{font-family:var(--lb);font-size:10px;color:#F4F0E6;font-weight:500;}
.p-pl .plan{font-family:var(--lb);font-size:8px;color:rgba(244,240,230,.4);margin-top:1px;}
.p-pl .plrl{width:24px;height:1px;background:rgba(212,168,83,.3);flex-shrink:0;}
.p-bk{background:#0D0D0D;color:#F4F0E6;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;height:100%;}
.p-bk .bkl{font-family:'Abril Fatface',serif;font-size:clamp(32px,6vw,52px);letter-spacing:4px;color:#F4F0E6;margin-bottom:8px;}
.p-bk .bkr{height:1px;background:#D4A853;width:80%;margin:12px auto;}
.p-bk .bkt{font-family:var(--lb);font-style:italic;font-size:13px;color:rgba(244,240,230,.4);margin-bottom:24px;}
.p-bk .bku{font-family:var(--lb);font-size:9px;letter-spacing:3px;color:#D4A853;text-transform:uppercase;}
.p-bk .bkv{font-family:var(--lb);font-size:8px;letter-spacing:4px;color:rgba(244,240,230,.2);text-transform:uppercase;margin-top:32px;}
</style>
</head>
<body>
<div id="reader">
  <div id="reader-bar">
    <div class="rb-logo">AFTER<span>NOISE</span></div>
    <div class="rb-info" id="rb-info">Vol. I &mdash; Origins &middot; 2026</div>
    <button class="rb-close" onclick="window.location.href='/'">&#10005; Close</button>
  </div>
  <div id="stage">
    <button class="nav-btn" id="btn-prev" onclick="turnPage(-1)">&#8249;</button>
    <div id="book">
      <div class="page page-left" id="page-left"><div class="page-inner" id="pl-inner"></div><div class="spine-left"></div></div>
      <div class="page page-right" id="page-right"><div class="page-inner" id="pr-inner"></div><div class="spine-right"></div></div>
    </div>
    <button class="nav-btn" id="btn-next" onclick="turnPage(1)">&#8250;</button>
    <div id="swipe-hint">Swipe or use arrow keys to turn pages</div>
  </div>
  <div id="page-counter">Spread 1 of 10</div>
  <div id="thumb-strip"></div>
</div>
<script>
var SPREADS=[
  {id:'cover',   l:{t:'cover'}, r:{t:'toc'}},
  {id:'letter',  l:{t:'letA'},  r:{t:'letB'}},
  {id:'dt',      l:{t:'art',badge:'FREQUENCIES',bc:'#8B1A0A',hl:'DT the Artist',sh:'The New Sound Nobody Saw Coming',by:'By Afternoise Editorial \u00b7 Toronto, ON'}, r:{t:'bod',sec:'FREQUENCIES',dr:'H',body:'ow does a rapper from Toronto fuse soca with hip-hop and build something the world has not heard before? DT the Artist is not waiting for the industry to catch up. BTP is the movement, Toronto is the origin, and the music is the proof.',pq:'The culture was already moving before anyone had a name for it.'}},
  {id:'4d',      l:{t:'art',badge:'FREQUENCIES',bc:'#1A3A5C',hl:'4D',sh:'Engineer. Producer. Artist.',by:'By Afternoise Editorial \u00b7 BTP \u00b7 Toronto, ON'}, r:{t:'bod',sec:'FREQUENCIES',dr:'E',body:'very record you hear starts somewhere nobody sees. 4D is in that room \u2014 the engineer who shapes the sound, the producer who builds the bed, and the artist who knows what it should feel like before it exists. BTP is not just a crew. It is a standard.',pq:'I build the sound before the artist knows what they need.'}},
  {id:'soca',    l:{t:'art',badge:'SIGNAL',bc:'#8B4A00',hl:'Soca & The City',sh:'How Caribbean Carnival Took Root in Toronto',by:'By Afternoise Editorial \u00b7 Toronto, ON'}, r:{t:'bod',sec:'SIGNAL',dr:'T',body:'oronto Caribbean Carnival has been running for 57 years. It started in 1967 as Caribana \u2014 a community-led initiative to celebrate Canada\u2019s Centennial. What began as a parade on Yonge Street with 50,000 people has grown into one of the largest cultural festivals in North America.',pq:'The culture does not ask for your credentials before it lets you in.'}},
  {id:'costume', l:{t:'art',badge:'DRIP MAPS',bc:'#4A1A6B',hl:'Costume Creators',sh:'The Mas Band Making Art You Wear',by:'By Afternoise Editorial \u00b7 Toronto, ON'}, r:{t:'bod',sec:'DRIP MAPS',dr:'A',body:'year of work for one day on the road. The Costume Creators are not making fashion \u2014 they are making architecture. Every sequin, every wire frame, every feather is a deliberate decision made months before carnival morning.',pq:'These costumes took an entire year to build. The road is the gallery.'}},
  {id:'dj',      l:{t:'art',badge:'SIGNAL',bc:'#0A3D2E',hl:'DJ Black Ent & DJ 3 Live',sh:'From the Club to the Carnival',by:'By Afternoise Editorial \u00b7 Fort Myers, FL \u00b7 Toronto, ON'}, r:{t:'bod',sec:'SIGNAL',dr:'T',body:'hey met in Fort Myers at Tequila Bar in 2015 \u2014 a promoter booked them both and they have been brothers ever since. DJ Black Ent is from Dominica. DJ 3 Live is from South Florida. Their paths crossed in a small Florida city and led to a carnival truck in Toronto.',pq:'Play it. As soon as the song dropped the masqueraders started moving.'}},
  {id:'toronto', l:{t:'art',badge:'PASSPORT',bc:'#1A1A2E',hl:'Toronto After Dark',sh:'The Afternoise Hotspot Guide',by:'By Afternoise Editorial \u00b7 Toronto, ON'}, r:{t:'bod',sec:'PASSPORT',dr:'W',body:'hen carnival is over the city does not sleep. Toronto After Dark is the guide to what happens when the road empties and the real conversations begin. The spots, the sounds, and the people who make Toronto feel like nowhere else after midnight.',pq:'After the parade the city belongs to the ones who stayed.'}},
  {id:'radar',   l:{t:'art',badge:'NEW ARTIST RADAR',bc:'#555',hl:'Yannaabaiibee',sh:'Watch This Space',by:'Canada \u00b7 Musical Artist'}, r:{t:'bod',sec:'RADAR',dr:'O',body:'ne artist building something real before the world catches up. Yannaabaiibee is from Canada with Dominican roots \u2014 and both worlds show up in her music. She is the Vol. I Radar pick because the work is already in motion.',pq:'The culture was always there. Now so are we.'}},
  {id:'pl',      l:{t:'pl'}, r:{t:'back'}},
];
var TRACKS=[
  {n:'01',title:'Inch By Inch',artist:'Yung Breda'},
  {n:'02',title:'Wanna Party',artist:'Ding Dong'},
  {n:'03',title:'Kaya',artist:'Freetown Collective'},
  {n:'04',title:'Cyah Behave',artist:'Voice'},
  {n:'05',title:'Stink Waist',artist:'Lyrikal, Travis World'},
  {n:'06',title:'Still A Road Man',artist:'Bunji Garlin'},
  {n:'07',title:'SWAY',artist:'Erphaan Alves'},
  {n:'08',title:'Love On D Road',artist:'Braveboy'},
  {n:'09',title:'Tay Lay Lay',artist:'Nailah Blackman x GBM Nutron'},
  {n:'10',title:'Big Truck',artist:'Imani Ray'},
];
var TOC=[
  {n:'01',sec:'FREQUENCIES',title:'DT the Artist',sub:'The New Sound Nobody Saw Coming'},
  {n:'02',sec:'FREQUENCIES',title:'4D',sub:'Engineer. Producer. Artist.'},
  {n:'03',sec:'SIGNAL',title:'Soca & The City',sub:'How Caribbean Carnival Took Root'},
  {n:'04',sec:'DRIP MAPS',title:'Costume Creators',sub:'The Mas Band Making Art You Wear'},
  {n:'05',sec:'SIGNAL',title:'DJ Black Ent & DJ 3 Live',sub:'From the Club to the Carnival'},
  {n:'06',sec:'PASSPORT',title:'Toronto After Dark',sub:'The Afternoise Hotspot Guide'},
  {n:'07',sec:'RADAR',title:'Yannaabaiibee',sub:'Watch This Space'},
  {n:'08',sec:'SOUND',title:'The Playlist',sub:'Road to Toronto Carnival'},
];
var cur=0,anim=false;
function init(){
  setSizes();
  buildThumbs();
  render(0);
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key==='ArrowDown')turn(1);
    if(e.key==='ArrowLeft'||e.key==='ArrowUp')turn(-1);
  });
  var sx=0;
  document.getElementById('book').addEventListener('touchstart',function(e){sx=e.touches[0].clientX;},{passive:true});
  document.getElementById('book').addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>40)turn(dx<0?1:-1);},{passive:true});
  window.addEventListener('resize',function(){setSizes();render(cur);});
}
function setSizes(){
  var s=document.getElementById('stage');
  var sw=s.clientWidth-120,sh=s.clientHeight-40;
  var ph=Math.min(sh,680),pw=Math.min(sw/2,ph*0.68);
  ph=Math.min(ph,pw/0.68);
  if(window.innerWidth<=768){pw=Math.min(sw,340);ph=pw/0.68;}
  document.documentElement.style.setProperty('--pw',pw+'px');
  document.documentElement.style.setProperty('--ph',ph+'px');
}
function buildThumbs(){
  var strip=document.getElementById('thumb-strip');
  strip.innerHTML='';
  var labels={0:'Cover',1:'Letter',2:'DT',3:'4D',4:'Soca',5:'Costume',6:'DJs',7:'Toronto',8:'Radar',9:'Playlist'};
  var bgmap={'cover':'#0D0D0D','toc':'#F4F0E6','letA':'#0D0D0D','art':'#1A1A1A','bod':'#F4F0E6','pl':'#111','back':'#0D0D0D'};
  SPREADS.forEach(function(sp,i){
    var t=document.createElement('div');
    t.className='thumb'+(i===0?' active':'');
    t.dataset.i=i;
    t.onclick=function(){go(parseInt(this.dataset.i));};
    var bg=document.createElement('div');bg.className='thumb-bg';
    bg.style.background=bgmap[sp.l.t]||'#1A1A1A';
    var lb=document.createElement('div');lb.className='thumb-label';
    lb.textContent=labels[i]||(i+1);
    t.appendChild(bg);t.appendChild(lb);strip.appendChild(t);
  });
}
function render(idx){
  var sp=SPREADS[idx];
  document.getElementById('pl-inner').innerHTML=buildPage(sp.l);
  document.getElementById('pr-inner').innerHTML=buildPage(sp.r);
  document.getElementById('rb-info').textContent='Vol. I \u2014 Origins \u00b7 Spread '+(idx+1)+' of '+SPREADS.length;
  document.getElementById('page-counter').textContent='Spread '+(idx+1)+' of '+SPREADS.length+' \u00b7 Afternoise Vol. I \u2014 Origins \u00b7 2026';
  document.getElementById('btn-prev').disabled=(idx===0);
  document.getElementById('btn-next').disabled=(idx===SPREADS.length-1);
  document.querySelectorAll('.thumb').forEach(function(t,i){t.classList.toggle('active',i===idx);});
  var at=document.querySelector('.thumb.active');
  if(at)at.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
}
function buildPage(pg){
  switch(pg.t){
    case 'cover': return buildCover();
    case 'toc':   return buildTOC();
    case 'letA':  return buildLetA();
    case 'letB':  return buildLetB();
    case 'art':   return buildArt(pg);
    case 'bod':   return buildBod(pg);
    case 'pl':    return buildPL();
    case 'back':  return buildBack();
    default:      return '<div style="background:#111;width:100%;height:100%;"></div>';
  }
}
function buildCover(){
  var h='<div class="p-cover" style="width:100%;height:100%;position:relative;">';
  h+='<div class="cv-photo"><span>COVER PHOTO</span></div>';
  h+='<div class="cv-overlay"></div>';
  h+='<div class="cv-content">';
  h+='<div class="cv-mast">AFTERNOISE</div>';
  h+='<div class="cv-rule"></div>';
  h+='<div class="cv-kick">Vol. I &middot; Origins &middot; 2026</div>';
  h+='<div style="font-style:italic;font-size:9px;color:rgba(244,240,230,.5);text-align:center;margin-bottom:12px;font-family:var(--lb);">&ldquo;Real work. Real time. No permission needed.&rdquo;</div>';
  h+='<div>';
  ['DT the Artist','4D','Soca & The City','Costume Creators','DJ Black Ent & DJ 3 Live','Toronto After Dark'].forEach(function(s){h+='<div class="cv-line">'+s+'</div>';});
  h+='</div>';
  h+='<div class="cv-artists"><div><div class="cv-aname">4D</div><div class="cv-arole">BTP &middot; Engineer</div></div>';
  h+='<div style="text-align:right"><div class="cv-aname">DT THE ARTIST</div><div class="cv-arole">BTP &middot; Toronto, ON</div></div></div>';
  h+='</div></div>';
  return h;
}
function buildTOC(){
  var h='<div class="p-toc" style="width:100%;height:100%;overflow:hidden;">';
  h+='<div class="th"><div class="tl">Contents</div><div class="tt">Vol. I &mdash; Origins</div></div>';
  h+='<div class="tlist">';
  TOC.forEach(function(item){
    h+='<div class="ti"><div class="tn">'+item.n+'</div><div class="tw"><div class="ts">'+item.sec+'</div><div class="tk">'+item.title+'</div><div class="td">'+item.sub+'</div></div></div>';
  });
  h+='</div>';
  h+='<div style="padding:12px 20px;border-top:.5px solid #ddd;"><div style="font-size:7px;letter-spacing:3px;color:#D4A853;text-transform:uppercase;margin-bottom:4px;font-family:var(--lb);">Also In This Issue</div>';
  h+='<div style="font-size:9px;color:#888;font-family:var(--lb);">Yannaabaiibee Radar &middot; The Playlist &middot; In Frame Photos</div></div>';
  h+='</div>';
  return h;
}
function buildLetA(){
  var h='<div class="p-let">';
  h+='<div class="le">Vol. I &middot; Origins &middot; 2026</div>';
  h+='<div class="lt">Letter from the Editor</div>';
  h+='<div class="lr"></div>';
  h+='<div class="lb2"><span class="ld">T</span>here is a moment \u2014 most of us have had it \u2014 where everything around you is loud, uncertain, and moving too fast. The world shifts, people change, circumstances change, and somehow in the middle of all of it, music is just there. Steady. Unchanged. Waiting.<br><br>I was seven years old the first time I understood that. My parents had records, cassette tapes, CDs \u2014 a whole collection that told me the world had been feeling something long before I arrived in it. That was my first education. Not a classroom. A record collection.<br><br>That feeling never left.</div>';
  h+='<div style="margin-top:16px;padding:12px;background:rgba(212,168,83,.08);border-left:2px solid #D4A853;"><div style="font-style:italic;font-size:9px;color:rgba(244,240,230,.6);line-height:1.7;font-family:var(--lb);">&ldquo;After the noise, what remains is the truth of who was really there.&rdquo;</div></div>';
  h+='</div>';
  return h;
}
function buildLetB(){
  var h='<div class="p-let">';
  h+='<div class="lb2">Afternoise was built for that space. The space after the noise.<br><br>We live in a time where visibility is currency and attention is manufactured. Where the loudest voice in the room is often the one with the least to say. Culture vultures \u2014 the ones who arrive after the work is done, take what was never theirs, and move on before the bill comes due. This magazine is not for them.<br><br>Afternoise is for the ones who were already in it before anyone was watching.<br><br>Vol. I is called Origins because everything in this issue starts at the beginning. Before the recognition. Before the numbers. Before the world caught up.<br><br><strong style="color:#D4A853;">Afternoise is the receipt.</strong></div>';
  h+='<div class="lsig"><div class="lsn">Craig Allen</div><div class="lsr">Founder & Editor in Chief &middot; Afternoise Magazine & Radio</div></div>';
  h+='</div>';
  return h;
}
function buildArt(pg){
  var h='<div class="p-art" style="width:100%;height:100%;">';
  h+='<div class="ap"><span>PHOTO</span></div>';
  h+='<div class="ao"></div>';
  h+='<div class="ac">';
  h+='<div class="ab" style="background:'+pg.bc+';color:#F4F0E6;">'+pg.badge+'</div>';
  h+='<div class="ah">'+pg.hl+'</div>';
  h+='<div class="as">'+pg.sh+'</div>';
  h+='<div class="aby">'+pg.by+'</div>';
  h+='</div></div>';
  return h;
}
function buildBod(pg){
  var h='<div class="p-bod">';
  h+='<div class="bs">'+pg.sec+'</div>';
  h+='<div class="bt"><span class="bd">'+pg.dr+'</span>'+pg.body+'</div>';
  h+='<div class="bpq">&ldquo;'+pg.pq+'&rdquo;</div>';
  h+='<div style="font-size:9px;color:#888;font-style:italic;margin-top:8px;font-family:var(--lb);">Read the full story at afternoisemag.com</div>';
  h+='</div>';
  return h;
}
function buildPL(){
  var h='<div class="p-pl">';
  h+='<div class="plt">The Playlist</div>';
  h+='<div class="pls">Afternoise Origins: Road to Toronto Carnival</div>';
  h+='<div class="plr"></div>';
  TRACKS.forEach(function(t){
    h+='<div class="pltr"><div class="pln">'+t.n+'</div><div class="plrl"></div><div class="pli"><div class="pltn">'+t.title+'</div><div class="plan">'+t.artist+'</div></div></div>';
  });
  h+='</div>';
  return h;
}
function buildBack(){
  var h='<div class="p-bk">';
  h+='<div class="bkl">AFTERNOISE</div>';
  h+='<div class="bkr"></div>';
  h+='<div class="bkt">Culture Doesn&rsquo;t Wait.</div>';
  h+='<div class="bku">afternoisemag.com</div>';
  h+='<div style="margin-top:24px;font-size:8px;letter-spacing:2px;color:rgba(244,240,230,.2);font-family:var(--lb);">@afternoisemagazine &middot; @afternoisemag</div>';
  h+='<div class="bkv">Vol. I &middot; Origins &middot; 2026</div>';
  h+='</div>';
  return h;
}
function turn(dir){
  if(anim)return;
  var next=cur+dir;
  if(next<0||next>=SPREADS.length)return;
  go(next);
}
function go(idx){
  if(anim||idx===cur)return;
  anim=true;
  var book=document.getElementById('book');
  book.style.transition='opacity .18s ease';
  book.style.opacity='0';
  setTimeout(function(){
    cur=idx;render(idx);
    book.style.opacity='1';
    setTimeout(function(){anim=false;},200);
  },180);
}
window.addEventListener('load',init);
</script>
