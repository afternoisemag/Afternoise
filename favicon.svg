<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark circle background -->
  <circle cx="16" cy="16" r="16" fill="#0D0D0D"/>
  <!-- Gold ring -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#D4A853" stroke-width="1"/>
  <!-- A mark - left leg -->
  <polygon points="9,24 11.5,24 16,10 14.5,8" fill="#F4F0E6"/>
  <!-- A mark - right leg -->
  <polygon points="23,24 20.5,24 16,10 17.5,8" fill="#F4F0E6"/>
  <!-- Serif left base -->
  <rect x="8" y="23" width="5" height="1.5" fill="#F4F0E6"/>
  <!-- Serif right base -->
  <rect x="19" y="23" width="5" height="1.5" fill="#F4F0E6"/>
  <!-- Gold crossbar -->
  <rect x="12" y="17.5" width="3.2" height="1.2" fill="#D4A853"/>
  <rect x="16.8" y="17.5" width="3.2" height="1.2" fill="#D4F0E6" fill="#D4A853"/>
  <!-- Gold apex dot -->
  <circle cx="16" cy="8.5" r="1.2" fill="#D4A853"/>
</svg>
