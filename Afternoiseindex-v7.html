// ── HELPERS ───────────────────────────────────────────────
function h(tag,attrs){
  var el=document.createElement(tag);
  var kids=Array.prototype.slice.call(arguments,2);
  if(attrs)Object.keys(attrs).forEach(function(k){
    if(k==='className')el.className=attrs[k];
    else if(k==='style')Object.assign(el.style,attrs[k]);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),attrs[k]);
    else el.setAttribute(k,attrs[k]);
  });
  kids.forEach(function(c){
    if(c==null)return;
    if(typeof c==='string'||typeof c==='number')el.appendChild(document.createTextNode(c));
    else el.appendChild(c);
  });
  return el;
}
function go(page,idx){
  cancelAnimationFrame(tickRaf);
  var wrap=document.getElementById('page-wrap');
  if(wrap){wrap.style.opacity='0';wrap.style.transform='translateY(10px)';}
  setTimeout(function(){
    state.page=page;state.storyIdx=idx!=null?idx:null;
    window.scrollTo(0,0);
    render();
    var nw=document.getElementById('page-wrap');
    if(nw){
      setTimeout(function(){
        nw.style.transition='opacity .45s ease,transform .45s ease';
        nw.style.opacity='1';nw.style.transform='translateY(0)';
        nw.querySelectorAll('.fade').forEach(function(f){setTimeout(function(){f.classList.add('in');},60);});
      },40);
    }
    runTicker();
  },240);
}
function runTicker(){
  var el=document.getElementById('ticker-inner');
  if(!el)return;
  tickX-=0.42;el.style.transform='translateX('+tickX+'px)';
  tickRaf=requestAnimationFrame(runTicker);
}

}

// ── RENDER ────────────────────────────────────────────────
function render(){

  var pw=h('div',{id:'page-wrap',style:{opacity:0,transform:'translateY(10px)'}});
  pw.appendChild(buildTicker());
  if(state.page==='cover')pw.appendChild(buildCover());
  if(state.page==='toc')pw.appendChild(buildTOC());
  if(state.page==='article')pw.appendChild(buildArticle(state.storyIdx));
  root.appendChild(pw);
  setTimeout(function(){
    pw.style.transition='opacity .45s ease,transform .45s ease';pw.style.opacity='1';pw.style.transform='translateY(0)';
    pw.querySelectorAll('.fade').forEach(function(f){setTimeout(function(){f.classList.add('in');},60);});
    runTicker();

}
