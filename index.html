function h(tag,attrs){

function setupReveal(){
  var els=document.querySelectorAll('.reveal:not(.in)');
  if(!els.length)return;
  if(!('IntersectionObserver'in window)){els.forEach(function(e){e.classList.add('in');});return;}
  var obs=new IntersectionObserver(function(en){en.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target);}});},{threshold:0.15});
  els.forEach(function(e){obs.observe(e);});
}

// ─── RADIO PLAYER ─────────────────────────────────────────────────────────────
(function(){
  var audio = document.getElementById('radioAudio');
  var player = document.getElementById('radio-player');
  var trigger = document.getElementById('radioTrigger');
  var playBtn = document.getElementById('radioPlayBtn');
  var closeBtn = document.getElementById('radioCloseBtn');
  var dot = document.getElementById('radioDot');
  var playing = false;

  function showPlayer(){ player.classList.add('show'); trigger.style.display='none'; }
  function hidePlayer(){ player.classList.remove('show'); trigger.style.display='flex'; if(playing) stopRadio(); }

  function playRadio(){
    audio.play().then(function(){
      playing=true;
      playBtn.innerHTML='&#9646;&#9646;';
      dot.classList.remove('paused');
    }).catch(function(){
      playing=false;
      playBtn.innerHTML='&#9654;';
      dot.classList.add('paused');
    });
  }

  function stopRadio(){
    audio.pause();
    audio.currentTime=0;
    playing=false;
    playBtn.innerHTML='&#9654;';
    dot.classList.add('paused');
  }

  trigger.addEventListener('click', function(){
    showPlayer();
    playRadio();
  });

  playBtn.addEventListener('click', function(){
    if(playing) stopRadio(); else playRadio();
  });

  closeBtn.addEventListener('click', function(){
    hidePlayer();
  });

  // Show trigger after splash hides
  setTimeout(function(){ trigger.style.display='flex'; }, 2400);
})();


render();
